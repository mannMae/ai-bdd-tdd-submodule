name: Shared CI Pipeline

on:
  workflow_call:
    inputs:
      run_python_tests:
        type: boolean
        required: false
        default: false
      run_frontend_component_tests:
        type: boolean
        required: false
        default: false
      run_frontend_e2e_tests:
        type: boolean
        required: false
        default: false
      python_test_cmd:
        type: string
        required: false
        default: "pytest"
      frontend_component_test_cmd:
        type: string
        required: false
        default: "npm run test:unit"
      frontend_e2e_test_cmd:
        type: string
        required: false
        default: "npx playwright test"

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linting Tools
        run: |
          pip install pre-commit ruff mypy
          if [ -f package.json ]; then npm ci; fi

      - name: Run pre-commit checks
        run: pre-commit run --all-files

  python-tests:
    name: Python Test Suite
    needs: lint-and-format
    if: ${{ inputs.run_python_tests }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ] && [ ! -f requirements.txt ]; then pip install .[test] || pip install pytest; fi

      - name: Run Python Tests
        run: ${{ inputs.python_test_cmd }}

  frontend-component-tests:
    name: Frontend Component Tests
    needs: lint-and-format
    if: ${{ inputs.run_frontend_component_tests }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node.js dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Run Component Tests
        run: ${{ inputs.frontend_component_test_cmd }}

  frontend-e2e-tests:
    name: Frontend E2E Tests
    needs: lint-and-format
    if: ${{ inputs.run_frontend_e2e_tests }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node.js dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: ${{ inputs.frontend_e2e_test_cmd }}
