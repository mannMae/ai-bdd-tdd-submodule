[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "UP",  # pyupgrade (modern python syntax)
    "TID", # flake8-tidy-imports (banned imports)
]
ignore = []

[tool.ruff.lint.flake8-tidy-imports]
# Enforce architectural layers or ban unsafe packages if needed
# Example: banned-module-imports = { "some_module" = { message = "Ban this" } }

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
